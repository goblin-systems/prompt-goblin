name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: minor
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

      - name: Run integration tests
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun run test:integration

      - name: Determine next version
        id: version
        shell: pwsh
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}
        run: |
          git fetch --tags --force

          $latestTag = git tag --sort=-v:refname | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($latestTag)) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $baseVersion = $pkg.version
          }
          else {
            $baseVersion = $latestTag.TrimStart('v')
          }

          if ($baseVersion -notmatch '^(\d+)\.(\d+)\.(\d+)$') {
            throw "Unable to parse semantic version from '$baseVersion'"
          }

          $major = [int]$Matches[1]
          $minor = [int]$Matches[2]
          $patch = [int]$Matches[3]

          switch ($env:BUMP_TYPE) {
            'major' {
              $major += 1
              $minor = 0
              $patch = 0
            }
            'minor' {
              $minor += 1
              $patch = 0
            }
            'patch' {
              $patch += 1
            }
            default {
              throw "Unsupported bump type '$($env:BUMP_TYPE)'"
            }
          }

          $newVersion = "$major.$minor.$patch"
          $newTag = "v$newVersion"

          "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "new_tag=$newTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "Latest tag: $latestTag"
          Write-Host "Next version: $newVersion"

      - name: Create and push tag
        shell: pwsh
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          $tag = $env:NEW_TAG
          if (git rev-parse $tag 2>$null) {
            throw "Tag $tag already exists"
          }

          git tag $tag
          git push origin $tag

  build:
    name: Build (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-22.04

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.new_tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update version files
        shell: pwsh
        env:
          NEW_VERSION: ${{ needs.prepare.outputs.new_version }}
        run: |
          $version = $env:NEW_VERSION

          $packagePath = 'package.json'
          $package = Get-Content $packagePath -Raw | ConvertFrom-Json
          $package.version = $version
          $package | ConvertTo-Json -Depth 50 | Set-Content $packagePath -Encoding utf8

          $tauriPath = 'src-tauri/tauri.conf.json'
          $tauri = Get-Content $tauriPath -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 50 | Set-Content $tauriPath -Encoding utf8

          $cargoPath = 'src-tauri/Cargo.toml'
          $cargo = Get-Content $cargoPath -Raw
          $cargo = [regex]::Replace($cargo, '(?ms)(\[package\][^\[]*?version\s*=\s*")([^"]+)(")', "`${1}$version`${3}")
          Set-Content $cargoPath -Value $cargo -Encoding utf8

          Write-Host "Version files updated to $version"

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-bundle-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.new_tag }}
          name: Release ${{ needs.prepare.outputs.new_tag }}
          generate_release_notes: true
          files: |
            release-assets/**/*
