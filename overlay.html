<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Goblin Overlay</title>
    <link rel="stylesheet" href="/src/overlay-styles.css" />
    <script type="module" src="/src/overlay.ts" defer></script>
  </head>
  <body class="overlay-base">
    <div class="overlay-pill" id="overlay-pill" data-tauri-drag-region>
      <div class="overlay-main-row" id="overlay-main-row">
        <span class="recording-dot" id="recording-dot"></span>
        <span class="overlay-label" id="overlay-label">Listening...</span>
        <span class="overlay-timer" id="overlay-timer">0:00</span>
      </div>
      <div class="overlay-wave-wrap" id="overlay-wave-wrap">
        <canvas id="overlay-wave-canvas" height="28"></canvas>
      </div>
      <div class="overlay-hud" id="overlay-hud">
        <span id="overlay-hud-model">Model --</span>
        <span id="overlay-hud-latency">Latency --</span>
        <span id="overlay-hud-confidence">Confidence --</span>
      </div>
    </div>
    <div class="overlay-transcript" id="overlay-transcript"></div>
  </body>
</html>
